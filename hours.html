<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>munching moose — admin</title>
</head>
<body>
    <ul class="nav-links">
        <li><a href="index.html"><strong>menu</strong></a></li>
        <li><a href="hours.html"><strong>hours</strong></a></li>
        <li><a href="helpout.html"><strong>help out</strong></a></li>

    <div class="clock-container">
        <h1>Hours</h1>
        <button id="confetti-clock" class="cbtn" title="Click for a surprise!">🕒</button>
    </div>
    </header>

    <main class="hours">
        <table class="htable">
            <thead>
                <tr>
                    <th>Day</th>
                    <th>1st Lunch</th>
                    <th>2nd Lunch</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Monday</td>
                    <td>12:10 - 12:40</td>
                    <td>1:25 - 1:55</td>
                </tr>
                <tr>
                    <td>Tuesday</td>
                    <td>12:10 - 12:40</td>
                    <td>1:25 - 1:55</td>
                </tr>
                <tr>
                    <td>Wednesday</td>
                    <td>12:10 - 12:40</td>
                    <td>1:25 - 1:55</td>
                </tr>
                <tr>
                    <td>Thursday</td>
                    <td>12:10 - 12:40</td>
                    <td>1:25 - 1:55</td>
                </tr>
                <tr>
                    <td>Friday</td>
                    <td>12:10 - 12:40</td>
                    <td>1:25 - 1:55</td>
                </tr>
            </tbody>
        </table>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        var clockButton = document.getElementById('confetti-clock');
        
        clockButton.addEventListener('click', () => {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
        });
    </script>
    <footer>
        <p class="center">If you have any suggestions let us know!</p>
    </footer>

</body>
</html>
